name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build portfolio
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Select deployment theme
        id: theme
        shell: bash
        env:
          MANUAL_THEME: ${{ inputs.theme }}
          DEFAULT_THEME: ${{ vars.PORTFOLIO_THEME }}
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            themes=(
              "cyber-cyan"
              "black-green"
              "purple-lavender"
              "midnight-amber"
            )

            day_of_year=$(TZ=America/Toronto date +%j)
            theme_index=$((10#$day_of_year % ${#themes[@]}))
            selected_theme="${themes[$theme_index]}"

          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            selected_theme="$MANUAL_THEME"

          else
            selected_theme="${DEFAULT_THEME:-cyber-cyan}"
          fi

          echo "Selected theme: $selected_theme"
          echo "VITE_PORTFOLIO_THEME=$selected_theme" >> "$GITHUB_ENV"
          echo "theme=$selected_theme" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-dist
          path: dist
          if-no-files-found: error
          retention-days: 7