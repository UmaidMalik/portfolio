name: Release to GitHub Pages

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 8 * * *"
      timezone: "America/Toronto"

  workflow_dispatch:
    inputs:
      theme:
        description: Theme to deploy
        required: true
        default: cyber-cyan
        type: choice
        options:
          - cyber-cyan
          - black-green
          - purple-lavender
          - midnight-amber
          - paper-burgundy

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Display selected theme
        run: echo "Building portfolio with theme $VITE_PORTFOLIO_THEME"

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_PORTFOLIO_THEME: ${{ github.event_name == 'workflow_dispatch' && inputs.theme || vars.PORTFOLIO_THEME || 'cyber-cyan' }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: Deploy release
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        
      - name: Select deployment theme
        id: theme
        shell: bash
        env:
          MANUAL_THEME: ${{ inputs.theme }}
          DEFAULT_THEME: ${{ vars.PORTFOLIO_THEME }}
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            themes=(
              "cyber-cyan"
              "black-green"
              "purple-lavender"
              "midnight-amber"
              "paper-burgundy"
            )

            day_of_year=$(TZ=America/Toronto date +%j)
            theme_index=$((10#$day_of_year % ${#themes[@]}))
            selected_theme="${themes[$theme_index]}"

          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            selected_theme="$MANUAL_THEME"

          else
            selected_theme="${DEFAULT_THEME:-cyber-cyan}"
          fi

          echo "Selected theme: $selected_theme"
          echo "VITE_PORTFOLIO_THEME=$selected_theme" >> "$GITHUB_ENV"
          echo "theme=$selected_theme" >> "$GITHUB_OUTPUT"