name: Release to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      theme:
        description: Theme to deploy
        required: true
        default: cyber-cyan
        type: choice
        options:
          - cyber-cyan
          - black-green
          - purple-lavender
          - midnight-amber

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build release
    runs-on: ubuntu-latest

    env:
      VITE_PORTFOLIO_THEME: >-
        ${{ github.event_name == 'workflow_dispatch'
          && inputs.theme
          || vars.PORTFOLIO_THEME
          || 'cyber-cyan' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Display selected theme
        run: echo "Building portfolio with theme $VITE_PORTFOLIO_THEME"

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: Deploy release
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5